# ──────────────────────────────────────────────────────────────────────────────
# BET – Workflow 1: CI + Build + Push + Refresh PR
#
# Trigger : PR opened or updated targeting main (from any branch, typically dev)
#
# Steps:
#   1. Test       – run pytest (fails fast, no image built on failure)
#   2. Version    – determine next SemVer with git-cliff
#   3. Build&Push – build Docker image, push :vX.Y.Z + :latest to Docker Hub
#   4. Refresh PR – close any existing open PR dev→main, open a fresh one
#                   with the current version and commit in the description
#
# Required secrets (set in GitHub repo Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME  – Docker Hub username
#   DOCKERHUB_TOKEN     – Docker Hub access token (not password)
# ──────────────────────────────────────────────────────────────────────────────

name: CI — Build & Push

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needed to close + reopen PRs

    steps:

      # ── 1. Checkout (full history + tags for git-cliff) ──────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for git-cliff version bumping

      # ── 2. Test ──────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python run_tests.py

      # ── 3. Version ───────────────────────────────────────────────────────────
      - name: Determine next version
        id: version
        run: |
          pip install git-cliff
          VERSION=$(git cliff --bumped-version 2>/dev/null || echo "v0.1.0")
          # Ensure leading 'v'
          [[ $VERSION != v* ]] && VERSION="v${VERSION}"
          echo "app_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Next version: ${VERSION}"

      # ── 4. Build & Push ──────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            netanelazuz/bet-app:${{ steps.version.outputs.app_version }}
            netanelazuz/bet-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 5. Refresh PR ────────────────────────────────────────────────────────
      # Close every other open PR from the same head branch → main,
      # then update the current PR's title and body with the new version.
      - name: Refresh PR title & description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.app_version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          REPO="${{ github.repository }}"

          # Close any OTHER open PRs from the same head branch targeting main
          OTHER_PRS=$(gh pr list \
            --repo "$REPO" \
            --base main \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number \
            --jq ".[] | select(.number != $PR_NUMBER) | .number")

          for OLD_PR in $OTHER_PRS; do
            echo "Closing stale PR #${OLD_PR}"
            gh pr close "$OLD_PR" \
              --repo "$REPO" \
              --comment "Superseded by PR #${PR_NUMBER} (version ${VERSION})"
          done

          # Update current PR title + body with fresh version info
          gh pr edit "$PR_NUMBER" \
            --repo "$REPO" \
            --title "chore(release): deploy ${VERSION}" \
            --body "## Automated release PR

**Image:** \`netanelazuz/bet-app:${VERSION}\`
**Commit:** \`${{ github.sha }}\`
**Triggered by:** push to \`${HEAD_BRANCH}\` by @${{ github.actor }}

Merge this PR to trigger the deploy workflow → \`bet-infra\` updated → ArgoCD rolls out \`${VERSION}\`."

          echo "PR #${PR_NUMBER} updated for version ${VERSION}"
