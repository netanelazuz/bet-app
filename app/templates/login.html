{% extends "base.html" %}
{% block title %}Login – BET{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-6">
    <div class="w-full max-w-md">

        {# Card #}
        <div class="bg-surface-darker rounded-2xl border border-border-dark p-8 shadow-xl">
            <div class="flex flex-col items-center gap-3 mb-8">
                <span class="material-symbols-outlined text-primary text-4xl">casino</span>
                <h1 class="text-2xl font-black tracking-tight">Welcome back</h1>
                <p class="text-text-muted text-sm">Sign in to your BET account</p>
            </div>

            <form method="post" action="{{ url_for('auth.login') }}" class="flex flex-col gap-5">
                <label class="flex flex-col gap-1.5">
                    <span class="text-sm font-bold text-slate-100">Username</span>
                    <input type="text" name="username" required autocomplete="username"
                           placeholder="your_username"
                           class="form-input w-full rounded-lg bg-surface-dark border border-border-dark text-slate-100
                                  placeholder:text-text-muted px-4 py-3 text-sm
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"/>
                </label>

                <label class="flex flex-col gap-1.5">
                    <span class="text-sm font-bold text-slate-100">Password</span>
                    <input type="password" name="password" required autocomplete="current-password"
                           placeholder="••••••••"
                           class="form-input w-full rounded-lg bg-surface-dark border border-border-dark text-slate-100
                                  placeholder:text-text-muted px-4 py-3 text-sm
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"/>
                </label>

                <button type="submit"
                        class="mt-2 w-full py-3 rounded-lg bg-primary hover:bg-primary/80 text-white font-bold text-sm
                               transition shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-base">login</span>
                    Sign In
                </button>
            </form>

            <p class="text-center text-sm text-text-muted mt-6">
                No account?
                <a href="{{ url_for('auth.register') }}" class="text-primary hover:text-primary/80 font-bold transition">
                    Register here
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
